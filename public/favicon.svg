<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4E4C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8941F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Ring 1 (Left) -->
  <ellipse cx="10" cy="18" rx="8" ry="3" 
           fill="none" 
           stroke="url(#gold-gradient)" 
           stroke-width="2.5"
           transform="rotate(-20 10 18)"
           opacity="0.9"/>
  
  <!-- Ring 2 (Right) -->
  <ellipse cx="22" cy="18" rx="8" ry="3" 
           fill="none" 
           stroke="url(#gold-gradient)" 
           stroke-width="2.5"
           transform="rotate(20 22 18)"
           opacity="0.9"/>
  
  <!-- Diamond accent -->
  <path d="M16 12 L18 14 L16 16 L14 14 Z" 
        fill="url(#gold-gradient)" 
        opacity="0.8"/>
  
  <!-- Small sparkle -->
  <circle cx="8" cy="10" r="1" fill="#D4AF37" opacity="0.7"/>
  <circle cx="24" cy="10" r="1" fill="#D4AF37" opacity="0.7"/>
</svg>